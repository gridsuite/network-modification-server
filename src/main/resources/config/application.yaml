spring:
  application:
    name: network-modification-server

  mvc:
    async:
      # To have the same behavior of no timeouts as regular endpoints for servlet 3.0+ asynccontext endpoints
      # Can be removed when set as default in our common ws config
      request-timeout: -1

  jpa:
    properties:
      hibernate:
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 512

  cloud:
    function:
      definition: consumeBuild1;consumeBuild2;consumeCancelBuild;consumeApplication
    stream:
      bindings:
        consumeBuild1-in-0: &consumeBuildConfig
          destination: ${powsybl-ws.rabbitmq.destination.prefix:}build.run
          group: buildGroup
          consumer:
            max-attempts: 1
        consumeBuild2-in-0:
          <<: *consumeBuildConfig
        publishBuild-out-0:
          destination: ${powsybl-ws.rabbitmq.destination.prefix:}build.run
        publishResultBuild-out-0:
          destination: ${powsybl-ws.rabbitmq.destination.prefix:}build.result
        consumeCancelBuild-in-0:
          destination: ${powsybl-ws.rabbitmq.destination.prefix:}build.cancel
        publishCancelBuild-out-0:
          destination: ${powsybl-ws.rabbitmq.destination.prefix:}build.cancel
        publishStoppedBuild-out-0:
          destination: ${powsybl-ws.rabbitmq.destination.prefix:}build.stopped
        consumeApplication-in-0:
          destination: ${powsybl-ws.rabbitmq.destination.prefix:}modification.run
          group: modificationGroup
          consumer:
            max-attempts: 1
        publishApplication-out-0:
          destination: ${powsybl-ws.rabbitmq.destination.prefix:}modification.run
        publishApplicationResult-out-0:
          destination: ${powsybl-ws.rabbitmq.destination.prefix:}modification.result
      output-bindings: publishBuild-out-0;publishResultBuild-out-0;publishCancelBuild-out-0;publishStoppedBuild-out-0;publishApplication-out-0;publishApplicationResult-out-0
      rabbit:
        bindings:
          consumeBuild1-in-0: &consumeBuildRabbitConfig
            consumer:
              auto-bind-dlq: true
              dead-letter-exchange: ${powsybl-ws.rabbitmq.destination.prefix:}build.run.dlx
              dead-letter-queue-name: ${powsybl-ws.rabbitmq.destination.prefix:}build.run.dlx.dlq
              dead-letter-exchange-type: topic
              quorum:
                enabled: true
                delivery-limit: 2
          consumeBuild2-in-0:
            <<: *consumeBuildRabbitConfig
          consumeApplication-in-0:
            consumer:
              auto-bind-dlq: true
              dead-letter-exchange: ${powsybl-ws.rabbitmq.destination.prefix:}modification.run.dlx
              dead-letter-queue-name: ${powsybl-ws.rabbitmq.destination.prefix:}modification.run.dlx.dlq
              dead-letter-exchange-type: topic
              quorum:
                enabled: true
                delivery-limit: 2

powsybl-ws:
  database:
    name: networkmodifications
    queryBegin: '&'
    customQuery: ${powsybl-ws.database.customQueryBegin}reWriteBatchedInserts=true
  autoconfigure:
    base-exception-handler:
      enable: false

# maximum concurrent applications of modifications with preloadingStrategy=ALL_COLLECTIONS_NEEDED_FOR_BUS_VIEW
# to avoid out of memory issues
max-large-concurrent-applications: 2
